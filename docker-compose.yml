services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: uns-backend
    env_file:
      - .env
    environment:
      APP_DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/uns
      APP_PUBLIC_BASE_URL: http://localhost:8001
      APP_FRONTEND_URL: http://localhost:5173
      APP_CORS_ORIGINS: http://127.0.0.1:5173,http://localhost:5173
    ports:
      - "8001:8000"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ../UNS-FE/frontend
      dockerfile: Dockerfile
    container_name: uns-frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8001/api/v1
    ports:
      - "5173:5173"
    volumes:
      - ../UNS-FE/frontend:/app
      - uns_frontend_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    container_name: uns-postgres
    environment:
      POSTGRES_DB: uns
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d uns"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  uns_frontend_node_modules:
