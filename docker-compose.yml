services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: uns-app
    env_file:
      - .env
    environment:
      APP_DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/uns
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: uns-postgres
    environment:
      POSTGRES_DB: uns
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d uns"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
